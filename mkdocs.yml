site_name: Rudra Prasad Sahu
site_url: https://rudraprsd.github.io/
theme:
  name: material
  palette: 
    # primary: brown
    # accent: amber
    # scheme: slate
    # primary: black
    # accent: orange
    # scheme: slate
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey  # Better contrast than white, easier on eyes
      accent: deep orange  # Warmer, less harsh than red
      toggle:
        icon: material/brightness-7
        name: The night is dark and full of terrors
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey  # Consistent with light mode
      accent: amber       # Softer than deep orange, better for reading
      toggle:
        icon: material/brightness-4
        name: Dracarys
  font:
    text: Inter          # Perfect for reading blogs/content
    code: JetBrains Mono
  
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    # - toc.integrate  # this will show the table of contets and all in left side
    - toc.follow
    - toc.anchor
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - css/particles-style.css

extra_javascript:
  - js/particles.min.js
  - js/particles-config.js

plugins:
  - search
  - tags
  - blog:
      # blog_toc: true
      post_excerpt: required
      post_excerpt_max_authors: 1
      post_excerpt_max_categories: 2
      post_readtime: true
      # post_readtime_words_per_minute: 200
  # - social:
  #     cards_layout_options:
  #       background_color: "#1e293b"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      # auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - About: about.md
    # - About Me: about/about.md
    # - My Childhood: about/childhood.md
  # - Tags: tags.md
  # - Codes: 
    # - Python: coding/hello_world.md
  - Projects: projects.md
  - Blogs:
    - blog/index.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:rudraprasad01@outlook.com
      name: Email
    - icon: fontawesome/brands/github
      link: https://github.com/rudraprsd
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rudra-prasad-sahu/
      name: LinkedIn

